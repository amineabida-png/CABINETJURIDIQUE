*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond',Georgia,serif;background:#0d0d0f;color:#e8e0d0;display:flex;height:100vh;overflow:hidden}

#main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.logo{padding:22px 20px 14px}
.logo-title{font-family:'Cinzel',serif;font-size:15px;letter-spacing:.12em;color:#d4b896}
.logo-sub{font-size:9px;color:#4a4238;letter-spacing:.1em;margin-top:3px;font-family:'Cinzel',serif}
.logo-hr{margin-top:12px;border:none;height:1px;background:linear-gradient(90deg,rgba(139,115,85,.5),transparent)}
.grp-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#3a3328;padding:12px 18px 4px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-radius:6px;font-size:11px;color:#7a7060;border:1px solid transparent;font-family:'Cinzel',serif;margin:1px 10px;background:none;width:calc(100% - 20px);text-align:left;transition:all .2s}

.nav-btn.active{background:linear-gradient(135deg,rgba(139,115,85,.2),rgba(180,150,100,.08));color:#d4b896;border-color:rgba(139,115,85,.3)}
.sidebar-foot{padding:14px 20px;border-top:1px solid rgba(139,115,85,.1);margin-top:auto}
.sidebar-foot p{font-size:10px;color:#4a4238;font-family:'Cinzel',serif}
.sidebar-foot span{font-size:9px;color:#2d2820;display:block;margin-top:2px}
#topbar{padding:15px 26px;border-bottom:1px solid rgba(139,115,85,.12);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.2);flex-shrink:0}
#page-title{font-family:'Cinzel',serif;font-size:17px;color:#d4b896;letter-spacing:.05em}
#page-date{font-size:11px;color:#4a4238;margin-top:2px}
#content{flex:1;overflow-y:auto;padding:22px 26px}
.card{background:linear-gradient(135deg,#141416,#0f0f12);border:1px solid rgba(139,115,85,.18);border-radius:10px;padding:22px;margin-bottom:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:1.5fr 1fr;gap:14px;margin-bottom:16px}
.g2e{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.g3c{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.stat-card{background:linear-gradient(135deg,#141416,#0f0f12);border:1px solid rgba(139,115,85,.18);border-radius:10px;padding:20px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#8b7355,transparent)}
.stat-val{font-family:'Cinzel',serif;font-size:22px;font-weight:600;margin:8px 0 4px}
.stat-lbl{font-size:11px;color:#8b7355;font-family:'Cinzel',serif;letter-spacing:.04em}
.stat-sub{font-size:10px;color:#4a4238;margin-top:3px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:#8b7355;font-size:10px;font-family:'Cinzel',serif;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid rgba(139,115,85,.18)}
td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);color:#c8bfb0;vertical-align:middle}
tr:hover td{background:rgba(139,115,85,.04)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-family:'Cinzel',serif}
.bav{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.22)}
.bno{background:rgba(139,115,85,.12);color:#d4b896;border:1px solid rgba(139,115,85,.28)}

.bpa{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.18)}
.btn{padding:9px 18px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;border:none;transition:all .2s;white-space:nowrap}
.bgold{background:linear-gradient(135deg,#8b7355,#a08060);color:#fff}

.tab-btn.active{background:rgba(139,115,85,.15);color:#d4b896;border-color:rgba(139,115,85,.3)}
input,select,textarea{background:rgba(255,255,255,.04);border:1px solid rgba(139,115,85,.2);color:#e8e0d0;border-radius:6px;padding:9px 14px;font-family:'Cormorant Garamond',serif;font-size:14px;outline:none}

select option{background:#1a1a1e}

.prog-bg{background:rgba(139,115,85,.12);border-radius:4px;height:6px;overflow:hidden;flex:1;min-width:60px}

.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;margin-left:-14px}
.flex{display:flex}.gap8{gap:8px}.gap14{gap:14px}.ac{align-items:center}.jb{justify-content:space-between}.f1{flex:1}.fc{flex-direction:column}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}

.modal{background:#141416;border:1px solid rgba(139,115,85,.3);border-radius:12px;padding:28px;width:480px;max-width:90vw}

.modal label{display:block;font-size:11px;color:#8b7355;font-family:'Cinzel',serif;letter-spacing:.06em;margin-bottom:5px;margin-top:14px}

    <div class="modal-btns">
      <button class="btn bghost" data-action="close-modal">Annuler</button>
      <button class="btn bgold" data-action="save-rdv">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL NOUVELLE FACTURE -->
<div class="modal-bg" id="modal-facture">
  <div class="modal">
    <h3>NOUVELLE FACTURE</h3>
    <label>Client</label>
    <input id="f-client" placeholder="Nom du client"/>
    <label>Dossier</label>
    <input id="f-dossier" placeholder="Ex: D-2024-001"/>
    <label>Montant HT (MAD)</label>
    <input id="f-montant" placeholder="Ex: 15000" type="number"/>
    <div class="modal-btns">
      <button class="btn bghost" data-action="close-modal">Annuler</button>

function b(text, cls) { return '<span class="badge '+cls+'">'+text+'</span>'; }
function sb(s) {
  var map = {"En cours":"bec","Payé":"bec","Signé":"bec","Planifiée":"bec","Conforme":"bec","Clôturé":"bcl","En attente":"bat","À compléter":"bat","Urgent":"bur","Partiel":"bpa","Déclaré":"bno"};
  return b(s, map[s]||"bat");
}

function openModal(id) { document.getElementById(id).classList.add("show"); }
function closeModals() {
  document.querySelectorAll(".modal-bg").forEach(function(m){ m.classList.remove("show"); });
}

function showNotif(msg) {
  var n = document.createElement("div");
  n.style.cssText = "position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#8b7355,#a08060);color:#fff;padding:14px 22px;border-radius:8px;font-family:'Cinzel',serif;font-size:12px;z-index:999;letter-spacing:.05em";
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(function(){ document.body.removeChild(n); }, 3000);
}

function buildNav() {
  var groups = [];
  MODULES.forEach(function(m){ if(groups.indexOf(m.group)<0) groups.push(m.group); });
  var html = "";
  groups.forEach(function(g){
    html += '<div class="grp-label">'+g+'</div>';
    MODULES.filter(function(m){return m.group===g;}).forEach(function(m){
      html += '<button class="nav-btn" data-id="'+m.id+'">'+m.icon+" "+m.label+'</button>';
    });
  });
  document.getElementById("nav-container").innerHTML = html;
  document.querySelectorAll(".nav-btn").forEach(function(btn){
    btn.addEventListener("click", function(){ goTo(this.getAttribute("data-id")); });
  });
}

function goTo(id) {
  document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
  var nb = document.querySelector('[data-id="'+id+'"]');
  if(nb) nb.classList.add("active");
  var mod = null;
  for(var i=0;i<MODULES.length;i++){ if(MODULES[i].id===id){ mod=MODULES[i]; break; } }
  document.getElementById("page-title").textContent = mod ? mod.label : id;
  var c = document.getElementById("content");
  if(id==="dashboard") c.innerHTML = pageDashboard();
  else if(id==="clients") c.innerHTML = pageClients();
  else if(id==="agenda") c.innerHTML = pageAgenda();
  else if(id==="actes") c.innerHTML = pageActes();
  else if(id==="honoraires") c.innerHTML = pageHonoraires();
  else if(id==="procedures") c.innerHTML = pageProcedures();
  else if(id==="bibliotheque") c.innerHTML = pageBib();
  else if(id==="collaborateurs") c.innerHTML = pageCollabs();
  else if(id==="comptabilite") c.innerHTML = pageCompta();
  else if(id==="conformite") c.innerHTML = pageConformite();
  else if(id==="portail") c.innerHTML = pagePortail();
}

// EVENT DELEGATION — handles ALL button clicks in content + modals
document.addEventListener("click", function(e) {
  var el = e.target.closest("[data-action]");
  if(!el) return;
  var action = el.getAttribute("data-action");

  if(action==="new-dossier") openModal("modal-dossier");
  else if(action==="new-rdv") openModal("modal-rdv");
  else if(action==="new-facture") openModal("modal-facture");
  else if(action==="new-acte") { showNotif("Nouvel acte créé"); }
  else if(action==="new-procedure") { showNotif("Nouvelle procédure ouverte"); }
  else if(action==="new-collaborateur") { showNotif("Nouveau collaborateur ajouté"); }
  else if(action==="new-charge") { showNotif("Nouvelle charge enregistrée"); }
  else if(action==="new-client") { showNotif("Nouveau client ajouté"); }
  else if(action==="envoyer-msg") { showNotif("Message envoyé de manière sécurisée"); }
  else if(action==="verifier-conflit") { showNotif("Aucun conflit d'intérêts détecté"); }
