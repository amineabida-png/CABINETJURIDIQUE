    .sidebar-footer p{font-size:10px;color:#4a4238;font-family:'Cinzel',serif;letter-spacing:.06em}
    .sidebar-footer span{font-size:9px;color:#2d2820}
    #header{padding:16px 26px;border-bottom:1px solid rgba(139,115,85,.1);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.18);flex-shrink:0}

    .stat-label{font-size:11px;color:#8b7355;margin-top:4px;font-family:'Cinzel',serif;letter-spacing:.04em}
    .stat-sub{font-size:10px;color:#4a4238;margin-top:4px}
    .two-col{display:grid;grid-template-columns:1.5fr 1fr;gap:14px}
    .three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}

    .mono{font-family:'Courier New',monospace;font-size:11px;color:#8b7355}
    .timeline-line{position:absolute;left:8px;top:0;bottom:0;width:1px;background:rgba(139,115,85,.2)}
    .progress-bg{background:rgba(139,115,85,.12);border-radius:4px;height:6px;overflow:hidden;flex:1}

    .msg-card:hover{background:rgba(139,115,85,.06);border-color:rgba(139,115,85,.24)}

    .hidden{display:none}
    .agenda-item{display:flex;gap:14px;align-items:center;padding:13px 16px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(139,115,85,.1);margin-bottom:10px}

    .chron-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;margin-left:-13px}

function badge(text, cls) {
  return `<span class="badge ${cls}">${text}</span>`;
}
function statutBadge(s) {
  if(s==="En cours") return badge(s,"b-encours");
  if(s==="Clôturé") return badge(s,"b-cloture");
  if(s==="En attente") return badge(s,"b-attente");
  if(s==="Urgent") return badge(s,"b-urgent");
  if(s==="Partiel") return badge(s,"b-partiel");
  if(s==="Payé") return badge(s,"b-encours");
  if(s==="Signé") return badge(s,"b-encours");
  if(s==="Planifiée") return badge(s,"b-encours");
  return badge(s,"b-attente");
}

// Build nav
function buildNav() {
  const groups = [...new Set(MODULES.map(m=>m.group))];
  let html = '';
  groups.forEach(g => {
    html += `<div class="nav-group-label">${g}</div>`;
    MODULES.filter(m=>m.group===g).forEach(m => {
      html += `<div class="nav-item" id="nav-${m.id}" onclick="navigate('${m.id}')">${m.icon} ${m.label}</div>`;
    });
  });
  document.getElementById('nav').innerHTML = html;
}

function navigate(id) {
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl = document.getElementById('nav-'+id);
  if(navEl) navEl.classList.add('active');
  const mod = MODULES.find(m=>m.id===id);
  document.getElementById('page-title').textContent = mod ? mod.label : id;
  const content = document.getElementById('content');
  content.innerHTML = '';
  const fn = pages[id];
  if(fn) content.innerHTML = fn();
}

function filterDossiers() {
  const search = (document.getElementById('search-dossier')||{value:''}).value.toLowerCase();
  const type = (document.getElementById('filter-type')||{value:'Tous'}).value;
  const filtered = DOSSIERS.filter(d => {
    const ms = d.client.toLowerCase().includes(search) || d.id.includes(search);
    const mt = type === 'Tous' || d.type === type;
    return ms && mt;
  });
  const tbody = document.getElementById('dossiers-tbody');
  if(tbody) tbody.innerHTML = filtered.map(d=>`<tr><td class="mono">${d.id}</td><td style="color:#e8e0d0">${d.client}</td><td>${badge(d.type,d.type==='Avocat'?'b-avocat':'b-notaire')}</td><td>${d.matiere}</td><td>${statutBadge(d.statut)}</td><td style="font-size:11px;color:#5a5248">${d.date}</td><td>${d.avocat}</td></tr>`).join('');
}

function switchBibTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('bib-codes').style.display = tab==='codes'?'grid':'none';
  document.getElementById('bib-juris').style.display = tab==='juris'?'block':'none';
}
