*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cormorant Garamond',Georgia,serif;background:#0d0d0f;color:#e8e0d0;display:flex;height:100vh;overflow:hidden}

.nav-btn:hover{background:rgba(139,115,85,.1);color:#c4a878}
.nav-btn.active{background:linear-gradient(135deg,rgba(139,115,85,.2),rgba(180,150,100,.08));color:#d4b896;border-color:rgba(139,115,85,.3)}
.sidebar-foot{padding:14px 20px;border-top:1px solid rgba(139,115,85,.1);margin-top:auto}
.sidebar-foot p{font-size:10px;color:#4a4238;font-family:'Cinzel',serif}
.sidebar-foot span{font-size:9px;color:#2d2820}
#topbar{padding:15px 26px;border-bottom:1px solid rgba(139,115,85,.12);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.2);flex-shrink:0}

.card{background:linear-gradient(135deg,#141416,#0f0f12);border:1px solid rgba(139,115,85,.18);border-radius:10px;padding:22px;margin-bottom:16px}
.stat-grid{display:grid;gap:14px;margin-bottom:16px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1.5fr 1fr}
.g2e{grid-template-columns:1fr 1fr}
.stat-card{background:linear-gradient(135deg,#141416,#0f0f12);border:1px solid rgba(139,115,85,.18);border-radius:10px;padding:20px;position:relative;overflow:hidden}

.stat-val{font-family:'Cinzel',serif;font-size:22px;font-weight:600;margin:8px 0 4px}
.stat-lbl{font-size:11px;color:#8b7355;font-family:'Cinzel',serif;letter-spacing:.04em}
.stat-sub{font-size:10px;color:#4a4238;margin-top:3px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;color:#8b7355;font-size:10px;font-family:'Cinzel',serif;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid rgba(139,115,85,.18)}

.bav{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.22)}
.bno{background:rgba(139,115,85,.12);color:#d4b896;border:1px solid rgba(139,115,85,.28)}
.bec{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.18)}
.bcl{background:rgba(100,100,100,.12);color:#888;border:1px solid rgba(100,100,100,.18)}
.bat{background:rgba(234,179,8,.1);color:#fbbf24;border:1px solid rgba(234,179,8,.18)}
.bur{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.22)}
.bpa{background:rgba(249,115,22,.1);color:#fb923c;border:1px solid rgba(249,115,22,.18)}
.btn{padding:9px 18px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.06em;border:none;transition:all .2s;white-space:nowrap}
.bgold{background:linear-gradient(135deg,#8b7355,#a08060);color:#fff}
.bgold:hover{background:linear-gradient(135deg,#9a8060,#b09070)}
.bghost{background:transparent;color:#8b7355;border:1px solid rgba(139,115,85,.3)}
.bghost:hover{background:rgba(139,115,85,.1);color:#d4b896}
.tab-btn{padding:8px 16px;border-radius:6px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;border:1px solid transparent;color:#6a6058;background:transparent;transition:all .2s}
.tab-btn.active{background:rgba(139,115,85,.15);color:#d4b896;border-color:rgba(139,115,85,.3)}
input,select,textarea{background:rgba(255,255,255,.04);border:1px solid rgba(139,115,85,.2);color:#e8e0d0;border-radius:6px;padding:9px 14px;font-family:'Cormorant Garamond',serif;font-size:14px;outline:none}
input:focus,select:focus,textarea:focus{border-color:rgba(139,115,85,.5)}
input::placeholder,textarea::placeholder{color:#4a4238}
select option{background:#1a1a1e}
.stitle{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#8b7355;margin-bottom:14px}
.flex{display:flex}.gap8{gap:8px}.gap14{gap:14px}.ac{align-items:center}.jb{justify-content:space-between}.f1{flex:1}.fc{flex-direction:column}
.mono{font-family:'Courier New',monospace;font-size:11px;color:#8b7355}
.prog-bg{background:rgba(139,115,85,.12);border-radius:4px;height:6px;overflow:hidden;flex:1}
.prog-bar{background:linear-gradient(90deg,#8b7355,#d4b896);height:100%;border-radius:4px}
.msg-card{background:rgba(255,255,255,.02);border:1px solid rgba(139,115,85,.12);border-radius:8px;padding:14px 16px;margin-bottom:8px}
.agenda-row{display:flex;gap:14px;align-items:center;padding:13px 16px;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(139,115,85,.1);margin-bottom:10px}
.tl-wrap{position:relative;padding-left:28px}
.tl-line{position:absolute;left:8px;top:0;bottom:0;width:1px;background:rgba(139,115,85,.2)}
.tl-row{display:flex;gap:14px;margin-bottom:14px}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;margin-left:-14px}

function b(text, cls) { return '<span class="badge '+cls+'">'+text+'</span>'; }
function sb(s) {
  if(s==="En cours"||s==="Payé"||s==="Signé"||s==="Planifiée"||s==="Conforme") return b(s,"bec");
  if(s==="Clôturé") return b(s,"bcl");
  if(s==="En attente"||s==="À compléter") return b(s,"bat");
  if(s==="Urgent") return b(s,"bur");
  if(s==="Partiel") return b(s,"bpa");
  if(s==="Déclaré") return b(s,"bno");
  return b(s,"bat");
}

var currentPage = "";
var bibTab = "codes";
var searchVal = "";
var filterVal = "Tous";

function buildNav() {
  var groups = [];
  MODULES.forEach(function(m) { if(groups.indexOf(m.group)<0) groups.push(m.group); });
  var html = "";
  groups.forEach(function(g) {
    html += '<div class="grp-label">'+g+'</div>';
    MODULES.filter(function(m){return m.group===g;}).forEach(function(m) {
      html += '<button class="nav-btn" data-id="'+m.id+'">'+m.icon+' '+m.label+'</button>';
    });
  });
  document.getElementById("nav-container").innerHTML = html;
  document.querySelectorAll(".nav-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { goTo(this.getAttribute("data-id")); });
  });
}

function goTo(id) {
  currentPage = id;
  document.querySelectorAll(".nav-btn").forEach(function(b){ b.classList.remove("active"); });
  var nb = document.querySelector('[data-id="'+id+'"]');
  if(nb) nb.classList.add("active");
  var mod = MODULES.find(function(m){return m.id===id;});
  document.getElementById("page-title").textContent = mod ? mod.label : id;
  render(id);
}

function render(id) {
  var c = document.getElementById("content");
  if(id==="dashboard") c.innerHTML = pageDashboard();
  else if(id==="clients") { c.innerHTML = pageClients(); bindClients(); }
  else if(id==="agenda") c.innerHTML = pageAgenda();
  else if(id==="actes") c.innerHTML = pageActes();
  else if(id==="honoraires") c.innerHTML = pageHonoraires();
  else if(id==="procedures") c.innerHTML = pageProcedures();
  else if(id==="bibliotheque") { c.innerHTML = pageBib(); bindBib(); }
  else if(id==="collaborateurs") c.innerHTML = pageCollabs();
  else if(id==="comptabilite") c.innerHTML = pageCompta();
  else if(id==="conformite") c.innerHTML = pageConformite();
  else if(id==="portail") c.innerHTML = pagePortail();
}

function pageDashboard() {
  var dos = DOSSIERS.slice(0,4).map(function(d) {
    return '<tr><td class="mono">'+d.id+'</td><td>'+d.client+'</td><td>'+b(d.type,d.type==="Avocat"?"bav":"bno")+'</td><td>'+sb(d.statut)+'</td></tr>';
  }).join("");
  var ag = AGENDA.slice(0,4).map(function(a) {
    return '<div style="display:flex;gap:10px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:8px"><div class="mono" style="font-size:13px;min-width:44px">'+a.heure+'</div><div><div style="font-size:13px;color:#c8bfb0">'+a.client+'</div><div style="font-size:10px;color:#4a4238;margin-top:2px">'+a.type+'</div></div></div>';
  }).join("");
  return '<div class="stat-grid g4"><div class="stat-card"><div style="font-size:18px">⚖</div><div class="stat-val" style="color:#d4b896">23</div><div class="stat-lbl">Dossiers actifs</div><div class="stat-sub">+3 ce mois</div></div><div class="stat-card"><div style="font-size:18px">📅</div><div class="stat-val" style="color:#60a5fa">5</div><div class="stat-lbl">RDV aujourd\'hui</div><div class="stat-sub">Prochain à 09:00</div></div><div class="stat-card"><div style="font-size:18px">🏛</div><div class="stat-val" style="color:#f87171">2</div><div class="stat-lbl">Procédures urgentes</div><div class="stat-sub">Échéance &lt; 15j</div></div><div class="stat-card"><div style="font-size:18px">💰</div><div class="stat-val" style="color:#4ade80">114 000 MAD</div><div class="stat-lbl">Honoraires à encaisser</div><div class="stat-sub">3 factures</div></div></div><div class="stat-grid g2"><div class="card"><div class="stitle">Dossiers récents</div><table><thead><tr><th>Réf.</th><th>Client</th><th>Type</th><th>Statut</th></tr></thead><tbody>'+dos+'</tbody></table></div><div class="card"><div class="stitle">Agenda du jour</div>'+ag+'</div></div>';
}

function pageClients() {
  var rows = DOSSIERS.map(function(d) {
    return '<tr><td class="mono">'+d.id+'</td><td style="color:#e8e0d0">'+d.client+'</td><td>'+b(d.type,d.type==="Avocat"?"bav":"bno")+'</td><td>'+d.matiere+'</td><td>'+sb(d.statut)+'</td><td style="font-size:11px;color:#5a5248">'+d.date+'</td><td>'+d.avocat+'</td></tr>';
  }).join("");
  return '<div class="flex gap8 ac" style="margin-bottom:16px"><input id="s-dos" placeholder="Rechercher..." style="width:280px"/><select id="f-type"><option>Tous</option><option>Avocat</option><option>Notaire</option></select><div class="f1"></div><button class="btn bgold">+ Nouveau dossier</button></div><div class="card"><table><thead><tr><th>Réf.</th><th>Client</th><th>Type</th><th>Matière</th><th>Statut</th><th>Date</th><th>Professionnel</th></tr></thead><tbody id="dos-body">'+rows+'</tbody></table></div>';
}

function bindClients() {
  var si = document.getElementById("s-dos");
  var ft = document.getElementById("f-type");
  function upd() {
    var s = si.value.toLowerCase();
    var t = ft.value;
    var rows = DOSSIERS.filter(function(d){ return (d.client.toLowerCase().indexOf(s)>=0||d.id.indexOf(s)>=0)&&(t==="Tous"||d.type===t); }).map(function(d){
      return '<tr><td class="mono">'+d.id+'</td><td style="color:#e8e0d0">'+d.client+'</td><td>'+b(d.type,d.type==="Avocat"?"bav":"bno")+'</td><td>'+d.matiere+'</td><td>'+sb(d.statut)+'</td><td style="font-size:11px;color:#5a5248">'+d.date+'</td><td>'+d.avocat+'</td></tr>';
    }).join("");
    document.getElementById("dos-body").innerHTML = rows;
  }
  si.addEventListener("input", upd);
  ft.addEventListener("change", upd);
}

function pageAgenda() {
  var rows = AGENDA.map(function(a,i) {
    return '<div class="agenda-row"><div class="mono" style="font-size:14px;min-width:48px">'+a.heure+'</div><div style="width:3px;height:36px;background:'+(i===0?'#4ade80':'#8b7355')+';border-radius:2px;flex-shrink:0"></div><div style="flex:1"><div style="font-size:14px;color:#e8e0d0">'+a.client+'</div><div style="font-size:11px;color:#5a5248;margin-top:3px">'+a.type+' · '+a.salle+'</div></div></div>';
  }).join("");

function pageActes() {
  var rows = ACTES.map(function(a) {
    return '<tr><td class="mono">'+a.ref+'</td><td style="color:#e8e0d0">'+a.titre+'</td><td>'+b(a.type,a.type==="Notarié"?"bno":"bav")+'</td><td style="font-size:11px;color:#5a5248">'+a.date+'</td><td>'+sb(a.statut)+'</td></tr>';

}

function pageHonoraires() {

function pageProcedures() {
  var rows = PROCEDURES.map(function(p) {

  }).join("");

    return '<div class="tl-row"><div class="tl-dot" style="background:'+col+';border:2px solid '+col+'"></div><div><div class="mono">'+e.date+'</div><div style="font-size:13px;color:'+(e.current?"#d4b896":e.done?"#c8bfb0":"#5a5248")+';margin-top:2px">'+e.evt+'</div></div></div>';

function pageBib() {
  var cards = CODES.map(function(c) {
    return '<div class="card" style="cursor:pointer"><div style="font-size:22px;margin-bottom:10px">'+c.icon+'</div><div style="font-family:\'Cinzel\',serif;font-size:12px;color:#d4b896;margin-bottom:6px">'+c.code+'</div><div style="font-size:11px;color:#8b7355;margin-bottom:3px">'+c.articles+'</div><div style="font-size:11px;color:#5a5248">'+c.domaine+'</div></div>';
  }).join("");
  var jrows = JURIS.map(function(j) {
    return '<tr><td class="mono" style="white-space:nowrap;font-size:10px">'+j.ref+'</td><td style="color:#e8e0d0">'+j.titre+'</td><td>'+b(j.domaine,"bat")+'</td><td style="font-size:11px;color:#5a5248">'+j.source+'</td></tr>';
  }).join("");
  return '<div class="flex gap8 ac" style="margin-bottom:16px"><button class="tab-btn active" id="t-codes">Codes & Textes</button><button class="tab-btn" id="t-juris">Jurisprudence</button><input placeholder="Rechercher..." style="width:240px;margin-left:8px"/></div><div id="bib-codes" style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">'+cards+'</div><div id="bib-juris" style="display:none"><div class="card"><table><thead><tr><th>Référence</th><th>Titre</th><th>Domaine</th><th>Source</th></tr></thead><tbody>'+jrows+'</tbody></table></div></div>';
}

function bindBib() {
  document.getElementById("t-codes").addEventListener("click", function() {
    document.getElementById("bib-codes").style.display="grid";
    document.getElementById("bib-juris").style.display="none";
    document.getElementById("t-codes").classList.add("active");
    document.getElementById("t-juris").classList.remove("active");
  });
  document.getElementById("t-juris").addEventListener("click", function() {
    document.getElementById("bib-codes").style.display="none";
    document.getElementById("bib-juris").style.display="block";
    document.getElementById("t-juris").classList.add("active");
    document.getElementById("t-codes").classList.remove("active");
  });
}

function pageCollabs() {
  var rows = COLLABS.map(function(c) {

    return '<tr><td style="color:#e8e0d0;font-weight:600">'+c.nom+'</td><td style="font-size:12px">'+c.role+'</td><td style="font-size:12px">'+c.spec+'</td><td style="font-family:\'Courier New\';color:#d4b896">'+c.dos+'</td><td>'+prog+'</td><td>'+b(c.conge?"Congé":"Actif",c.conge?"bat":"bec")+'</td></tr>';

}

  }).join("");
